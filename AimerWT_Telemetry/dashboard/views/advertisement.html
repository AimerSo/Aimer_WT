<div class="view-container active">
    <div class="app">
        <div class="topbar">
            <div class="top-actions" style="margin-left: auto;">
                <button class="btn" onclick="app.showAlert('广告数据已刷新', 'success')">刷新数据</button>
                <button class="btn primary" onclick="app.handleControl('advertisement')">新建广告</button>
            </div>
        </div>
        <div class="grid">
            <div class="panel span-6">
                <div class="panel-header">
                    <div class="panel-title">广告列表</div>
                </div>
                <div class="panel-body" style="padding: 24px;">
                    <div style="text-align: center; color: var(--text-muted); padding: 40px;">
                        <svg width="64" height="64" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" style="margin-bottom: 16px; opacity: 0.5;">
                            <rect x="3" y="3" width="18" height="18" rx="2" ry="2"></rect>
                            <line x1="3" y1="9" x2="21" y2="9"></line>
                            <line x1="9" y1="21" x2="9" y2="9"></line>
                        </svg>
                        <h3 style="margin-bottom: 8px;">广告管理</h3>
                        <p>广告创建、投放、统计</p>
                    </div>
                </div>
            </div>
            <div class="panel span-6">
                <div class="panel-header">
                    <div class="panel-title">投放统计</div>
                </div>
                <div class="panel-body" style="padding: 24px;">
                    <div style="text-align: center; color: var(--text-muted); padding: 40px;">
                        <svg width="64" height="64" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" style="margin-bottom: 16px; opacity: 0.5;">
                            <line x1="18" y1="20" x2="18" y2="10"></line>
                            <line x1="12" y1="20" x2="12" y2="4"></line>
                            <line x1="6" y1="20" x2="6" y2="14"></line>
                        </svg>
                        <h3 style="margin-bottom: 8px;">统计数据</h3>
                        <p>展示广告曝光量、点击率、转化率等数据</p>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>
